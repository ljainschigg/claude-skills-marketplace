name: Deploy Docs With Warnings

# Polls the workflow-queue branch every 15 minutes (or on manual trigger).
# Drains queue.txt, runs mike deploy for each valid branch, captures build
# warnings, and files/updates a GitHub issue summarising them.
# On success, calls publish-docs.yml to rsync built docs to the web server.

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"  # every 15 minutes (UTC)

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  pull-requests: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.process.outputs.pushed }}

    steps:
      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Checkout workflow-queue branch
        uses: actions/checkout@v6
        with:
          ref: workflow-queue
          fetch-depth: 0

      - name: Configure authenticated GitHub URL for future clones
        run: |
          echo "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com" > ~/.git-credentials
          git config --global credential.helper store

      - name: Grab queue, clear, and process all branches
        id: process
        run: |
          set -euo pipefail

          # ---------------------------------------------------------------
          # CUSTOMIZE: Set this to the current latest release branch when
          # cutting a new release. This is the only line that needs to change.
          # The version number and mike title are derived automatically below.
          # ---------------------------------------------------------------
          LATEST_RELEASE_BRANCH="release-v4.13"
          LATEST_VERSION="${LATEST_RELEASE_BRANCH#release-v}"

          LOG_FILE="/tmp/docs-build-process.log"
          : > "$LOG_FILE"

          # Redirect stdout and stderr to both log file and terminal
          exec > >(tee -a "$LOG_FILE")
          exec 2>&1

          PUSHED=false

          touch queue.txt
          QUEUE_LENGTH=$(grep -c -v '^\s*$' queue.txt || true)
          if [[ "$QUEUE_LENGTH" == "0" ]]; then
            echo "Queue is empty. Nothing to process."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t QUEUE < queue.txt
          for i in "${!QUEUE[@]}"; do
            QUEUE[$i]=$(echo "${QUEUE[$i]}" | tr -d '[:space:]')
          done

          CLEAN_QUEUE=()
          for item in "${QUEUE[@]}"; do
            if [[ -n "$item" ]]; then
              CLEAN_QUEUE+=("$item")
            fi
          done
          QUEUE=("${CLEAN_QUEUE[@]}")

          > queue.txt
          git add queue.txt
          git commit -m "Cleared queue for processing"
          git push origin workflow-queue

          TMPDIR=$(mktemp -d)
          echo "Working in $TMPDIR"

          git clone https://github.com/${{ github.repository }} "$TMPDIR"
          cd "$TMPDIR"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

          for BRANCH in "${QUEUE[@]}"; do
            if ! echo "$BRANCH" | grep -Eq '^main$|^release-v[0-9]+(\.[0-9]+)*$'; then
              echo "Skipping invalid branch: $BRANCH"
              continue
            fi

            echo "=== Processing $BRANCH ==="

            if ! git checkout "$BRANCH"; then
              echo "ERROR: Branch $BRANCH doesn't exist, skipping"
              continue
            fi

            rm -rf .venv
            python3 -m venv .venv
            source .venv/bin/activate

            if [ -f requirements.txt ]; then
              echo "Installing requirements for $BRANCH"
              pip install -r requirements.txt
            else
              echo "No requirements.txt in $BRANCH — skipping pip install"
            fi

            echo "Deploying docs for branch: $BRANCH"

            git fetch origin gh-pages || echo "gh-pages does not exist remotely"
            if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
              git branch -f gh-pages origin/gh-pages
            else
              echo "No origin/gh-pages ref — skipping branch sync"
            fi

            if [[ "$BRANCH" == "main" ]]; then
              # main deploys as "next" (hidden — not shown in version picker).
              mike deploy --ignore --push --prop-set hidden=true next
              PUSHED=true

            elif [[ "$BRANCH" == "$LATEST_RELEASE_BRANCH" ]]; then
              mike deploy -t "$LATEST_VERSION (latest)" --update-aliases --push --alias-type=copy "$LATEST_VERSION" latest stable
              mike set-default --push latest
              PUSHED=true

            else
              # All other release branches: deploy by bare version number, no aliases.
              # Strips "release-v" prefix: release-v4.0 → 4.0
              version="${BRANCH#release-v}"
              mike deploy -t "$version" --update-aliases --push "$version"
              PUSHED=true
            fi

            deactivate
          done

          echo "All branches processed."

          # -----------------------------------------------------------------
          # Write sitemap_index.xml and robots.txt to gh-pages root.
          #
          # sitemap_index.xml points crawlers only at the canonical (stable)
          # version's sitemap, preventing old versioned docs from being
          # treated as duplicate content.
          #
          # robots.txt blocks crawlers from indexing /next/ (pre-release).
          #
          # NOTE: robots.txt is only authoritative at the domain root
          # (https://docs.mirantis.com/robots.txt). The copy here at
          # /msr/robots.txt is best-effort for crawlers that respect
          # subdirectory robots files. Full enforcement requires adding the
          # Sitemap: directive and Disallow: rule to the domain-root
          # robots.txt separately.
          #
          # Submit the sitemap to Google Search Console at:
          # https://docs.mirantis.com/msr/sitemap.xml
          # -----------------------------------------------------------------
          if [[ "$PUSHED" == "true" ]]; then
            echo "Updating sitemap.xml and robots.txt on gh-pages..."

            git fetch origin gh-pages
            git checkout gh-pages

            # Fix sitemap URLs: mike appends the version identifier to site_url
            # during build, producing paths like /latest/4.13/page/ instead of
            # /latest/page/. Strip the injected version subdirectory in-place.
            if [[ -f "latest/sitemap.xml" ]]; then
              sed -i "s|/msr/latest/${LATEST_VERSION}/|/msr/latest/|g" latest/sitemap.xml
            fi

            {
              echo 'User-agent: *'
              echo 'Disallow: /msr/next/'
              echo 'Sitemap: https://docs.mirantis.com/msr/sitemap.xml'
            } > robots.txt

            {
              echo '<?xml version="1.0" encoding="UTF-8"?>'
              echo '<sitemapindex xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
              echo '  <sitemap>'
              echo '    <loc>https://docs.mirantis.com/msr/latest/sitemap.xml</loc>'
              echo '  </sitemap>'
              echo '</sitemapindex>'
            } > sitemap.xml

            git add robots.txt sitemap.xml latest/sitemap.xml
            git commit -m "Update robots.txt, sitemap.xml, and fix sitemap URLs" || echo "No changes to sitemap files."
            git push origin gh-pages
          fi

          echo "pushed=$PUSHED" >> "$GITHUB_OUTPUT"

      - name: Upload docs build log artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-build-process-log
          path: /tmp/docs-build-process.log
          retention-days: 14

  # Parses the build log and creates or updates a GitHub issue listing any
  # MkDocs warnings, with links to the most recent PRs for context.
  announce_warnings:
    needs: dispatch
    runs-on: ubuntu-latest
    if: always()
    permissions:
      issues: write
      pull-requests: read
      contents: read

    steps:
      - name: Download build log artifact
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: docs-build-process-log
          path: /tmp

      - name: Ensure docs-warnings label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh label create docs-warnings \
            --repo "$REPO" \
            --color "0075ca" \
            --description "Automated docs build warnings" \
            --force

      - name: Create or update docs warnings issue (main + release branches)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_AT_UTC: ${{ github.run_started_at }}
          LOG: /tmp/docs-build-process.log
        run: |
          set -euo pipefail

          if [[ ! -f "$LOG" ]]; then
            echo "No log file found; nothing to do."
            exit 0
          fi

          cat > /tmp/parse_warnings.py <<'PY'
          import os, re, json, subprocess
          from collections import OrderedDict

          log_path = os.environ["LOG"]
          repo = os.environ["REPO"]
          run_url = os.environ["RUN_URL"]
          run_at = os.environ["RUN_AT_UTC"]

          branch_re = re.compile(r"^=== Processing (.+) ===\s*$")
          warn_re = re.compile(r"(^|\s)(WARNING|WARN)(:|\s)", re.IGNORECASE)

          warnings = OrderedDict()
          current = None

          with open(log_path, "r", encoding="utf-8", errors="replace") as f:
              for line in f:
                  m = branch_re.match(line)
                  if m:
                      current = m.group(1).strip()
                      continue
                  if current and warn_re.search(line):
                      warnings.setdefault(current, []).append(line.rstrip())

          if not warnings:
              print("No warnings found; exiting.")
              raise SystemExit(0)

          def gh_json(args):
              p = subprocess.run(["gh"] + args, capture_output=True, text=True)
              if p.returncode != 0:
                  return None
              try:
                  return json.loads(p.stdout)
              except Exception:
                  return None

          def most_recent_pr(base, state):
              data = gh_json([
                  "pr","list",
                  "--repo", repo,
                  "--base", base,
                  "--limit","1",
                  "--state", state,
                  "--json","number,title,url,state,updatedAt,mergedAt",
                  "--jq","."
              ])
              if not data:
                  return None
              return data[0] if isinstance(data, list) and data else None

          lines = []
          lines.append("# Docs build warnings detected")
          lines.append("")
          lines.append(f"- Run time (UTC): **{run_at}**")
          lines.append(f"- Workflow run: {run_url}")
          lines.append("")
          lines.append("## Branches with warnings")
          for b in warnings.keys():
              lines.append(f"- `{b}`")
          lines.append("")

          for b, wlines in warnings.items():
              lines.append(f"## {b}")

              pr_any = most_recent_pr(b, "all")
              pr_merged = most_recent_pr(b, "merged")

              if pr_any:
                  lines.append(
                      f"- Most recent PR (any state): #{pr_any.get('number')} — {pr_any.get('title')} "
                      f"({pr_any.get('state')}, updated {pr_any.get('updatedAt')}) — {pr_any.get('url')}"
                  )
              else:
                  lines.append("- Most recent PR (any state): (none found)")

              if pr_merged:
                  lines.append(
                      f"- Most recent merged PR: #{pr_merged.get('number')} — {pr_merged.get('title')} "
                      f"(merged {pr_merged.get('mergedAt')}) — {pr_merged.get('url')}"
                  )
              else:
                  lines.append("- Most recent merged PR: (none found)")

              lines.append("")
              lines.append("**Warnings (excerpt):**")
              lines.append("```")
              excerpt = wlines[-200:] if len(wlines) > 200 else wlines
              lines.extend(excerpt)
              lines.append("```")
              lines.append("")

          out_path = "/tmp/docs-warnings-issue-body.md"
          with open(out_path, "w", encoding="utf-8") as f:
              f.write("\n".join(lines))

          print(f"Wrote issue body to {out_path}")
          PY

          python3 /tmp/parse_warnings.py

          BODY_FILE="/tmp/docs-warnings-issue-body.md"
          if [[ ! -f "$BODY_FILE" ]]; then
            echo "No warnings issue body generated; skipping issue creation."
            exit 0
          fi

          TITLE="Docs build warnings (main + release branches)"
          LABEL="docs-warnings"

          ISSUE_NUMBER="$(gh issue list --repo "$REPO" --state open --label "$LABEL" --limit 50 \
            --json number,title --jq ".[] | select(.title==\"$TITLE\") | .number" | head -n 1 || true)"

          if [[ -n "${ISSUE_NUMBER:-}" ]]; then
            echo "Updating existing issue #$ISSUE_NUMBER"
            gh issue edit --repo "$REPO" "$ISSUE_NUMBER" --title "$TITLE" --body-file "$BODY_FILE"
          else
            echo "Creating new issue"
            gh issue create --repo "$REPO" --title "$TITLE" --label "$LABEL" --body-file "$BODY_FILE"
          fi

  # Rsyncs the built docs from gh-pages to the private web server.
  publish:
    needs: dispatch
    if: ${{ needs.dispatch.outputs.pushed == 'true' }}
    uses: ./.github/workflows/publish-docs.yml
    secrets:
      DOCS_SSH_KEY: ${{ secrets.DOCS_SSH_KEY }}
